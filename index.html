<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#124a31" />
  <meta name="description" content="Waro App Jo — Schedule and manage Jamati Waro assignments" />
  <title>Waro App Jo</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%85%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Loading screen -->
  <div id="loading" class="loading-screen">
    <div class="spinner"></div>
    <p>Loading Waro App Jo…</p>
  </div>

  <!-- Auth screens (login / signup) -->
  <section id="auth-view" class="auth-view hidden">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">W</div>
        <h1>Waro App Jo</h1>
        <p class="subtitle">Jamati Waro Management</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <!-- Login form -->
      <form id="login-form" class="auth-form">
        <label>
          <span>Email</span>
          <input type="email" name="email" required autocomplete="email" />
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" required autocomplete="current-password" minlength="6" />
        </label>
        <button type="submit" class="btn btn-primary">Sign In</button>
        <p class="auth-error" id="login-error"></p>
        <button type="button" class="link-btn" id="forgot-password-btn">Forgot password?</button>
      </form>

      <!-- Signup form -->
      <form id="signup-form" class="auth-form hidden">
        <label>
          <span>Full Name</span>
          <input type="text" name="name" required autocomplete="name" />
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" required autocomplete="email" />
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" required autocomplete="new-password" minlength="6" />
          <small>Minimum 6 characters</small>
        </label>
        <label>
          <span>Jamatkhana</span>
          <select name="jamatkhana" required>
            <option value="">Select Jamatkhana…</option>
          </select>
        </label>
        <button type="submit" class="btn btn-primary">Create Account</button>
        <p class="auth-error" id="signup-error"></p>
        <p class="auth-note">Account creation requires admin approval before access is granted.</p>
      </form>
    </div>
    <p class="auth-footer">For Waro team use only · v1.0</p>
  </section>

  <!-- Main app (after login) -->
  <section id="app-view" class="app-view hidden">
    <header class="app-header">
      <div class="app-header-inner">
        <h1 id="page-title">Dashboard</h1>
        <div class="app-header-actions">
          <span class="user-chip" id="user-chip"></span>
          <button class="icon-btn" id="logout-btn" title="Sign out" aria-label="Sign out">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </header>

    <main id="page-content" class="page-content">
      <!-- Dynamically rendered -->
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-page="dashboard">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-page="members">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Members</span>
      </button>
      <button class="nav-btn" data-page="schedule">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Schedule</span>
      </button>
      <button class="nav-btn" data-page="majlis">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span>Majlis</span>
      </button>
      <button class="nav-btn hidden" data-page="users">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M15 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        <span>Users</span>
      </button>
    </nav>
  </section>

  <!-- Modal container -->
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root"></div>

  <!-- Firebase + app -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
